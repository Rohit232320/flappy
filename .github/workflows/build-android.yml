name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make Gradle Wrapper (if missing)
      working-directory: ./flappy/android
      run: gradle wrapper --gradle-version 8.7

    - name: Build with Gradle
      working-directory: ./flappy/android
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flappybird-android-apk
        path: flappy/android/app/build/outputs/apk/debug/app-debug.apk
