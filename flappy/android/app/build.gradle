plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bhat.flappybird'
    compileSdk 34

    defaultConfig {
        applicationId "com.bhat.flappybird"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        externalNativeBuild {
            cmake {
                cppFlags ""
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    externalNativeBuild {
        cmake {
            path "../../CMakeLists.txt"
            version "3.22.1"
        }
    }

    sourceSets {
        main {
            assets.srcDirs = ['../../sprites', '../../audio']
        }
    }
}
